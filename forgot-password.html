<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substracker — Detail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1e90ff,#00c8e0);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;flex-shrink:0;">S</div>
        <span>Substracker</span>
      </div>
      <div class="nav-section">
        <div class="nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">➕</span> Tambah langganan
        </a>
      </div>
      <div class="nav-section" style="margin-top:8px;">
        <div class="nav-label">Akun</div>
        <a href="profile.html" class="nav-item">
          <span class="nav-icon">👤</span> Profile
        </a>
        <button class="nav-item" onclick="DB.logout(); window.location.href='index.html'">
          <span class="nav-icon">🚪</span> Logout
        </button>
      </div>
      <div class="sidebar-bottom">
        <a href="profile.html" style="text-decoration:none;">
          <div class="user-card">
            <div class="user-avatar">U</div>
            <div class="user-info">
              <div class="user-name">User</div>
              <div class="user-email">user@email.com</div>
            </div>
          </div>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <button class="back-btn" onclick="history.back()">← Kembali</button>

      <div id="expiring-warning" class="warning-banner" style="display:none;">
        ⚠️ <span id="warning-msg"></span>
      </div>

      <!-- Detail Header -->
      <div class="detail-header">
        <div class="detail-icon" id="d-icon"></div>
        <div>
          <div class="detail-name" id="d-name"></div>
          <div class="detail-type" id="d-type"></div>
          <div class="detail-price" id="d-price"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:10px;">
          <button class="btn-secondary" onclick="openEditModal()">✏️ Edit</button>
          <button class="btn-danger" onclick="openDeleteModal()">🗑️ Hapus</button>
        </div>
      </div>

      <!-- Detail Grid -->
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-item-label">Status</div>
          <div class="detail-item-value" id="d-status"></div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Siklus tagihan</div>
          <div class="detail-item-value" id="d-cycle"></div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Tanggal mulai</div>
          <div class="detail-item-value" id="d-start"></div>
        </div>
        <div class="detail-item" id="d-next-item">
          <div class="detail-item-label" id="d-next-label">Tagihan berikutnya</div>
          <div class="detail-item-value" id="d-next"></div>
        </div>
        <div class="detail-item" id="d-notes-item" style="grid-column:1/-1;">
          <div class="detail-item-label">Catatan</div>
          <div class="detail-item-value" id="d-notes"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Edit langganan</div>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div id="edit-alert" class="alert alert-error"></div>
      <div class="form-group"><label>Nama layanan</label><input type="text" id="e-name"></div>
      <div class="form-group"><label>Tipe</label>
        <select id="e-type" onchange="toggleEditTrialFields()">
          <option value="subscription">Langganan berbayar</option>
          <option value="trial">Free trial</option>
        </select>
      </div>
      <div id="e-price-group" class="form-group"><label>Harga (Rp)</label><input type="number" id="e-price"></div>
      <div class="form-group"><label>Siklus tagihan</label>
        <select id="e-cycle">
          <option value="monthly">Bulanan</option>
          <option value="yearly">Tahunan</option>
          <option value="weekly">Mingguan</option>
        </select>
      </div>
      <div class="form-group"><label>Tanggal mulai</label><input type="date" id="e-start"></div>
      <div id="e-next-group" class="form-group"><label>Tagihan berikutnya</label><input type="date" id="e-next"></div>
      <div id="e-trial-group" class="form-group" style="display:none;"><label>Tanggal berakhir trial</label><input type="date" id="e-trial-end"></div>
      <div class="form-group"><label>Catatan</label><input type="text" id="e-notes"></div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeEditModal()">Batal</button>
        <button class="btn-primary" style="width:auto;padding:10px 24px;" onclick="saveEdit()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="del-modal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <div class="modal-title">Hapus langganan?</div>
        <button class="modal-close" onclick="document.getElementById('del-modal').classList.remove('show')">✕</button>
      </div>
      <p style="font-size:14px;color:var(--gray-text);">Langganan ini akan dihapus permanen.</p>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="document.getElementById('del-modal').classList.remove('show')">Batal</button>
        <button class="btn-danger" style="padding:10px 24px;" onclick="doDelete()">Hapus</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (!requireAuth()) throw 0;
    initUserUI();

    const params = new URLSearchParams(location.search);
    const subId = params.get('id');
    let currentSub = getSubById(subId);

    if (!currentSub) {
      window.location.href = 'dashboard.html';
      throw 0;
    }

    function renderDetail() {
      currentSub = getSubById(subId);
      if (!currentSub) { window.location.href = 'dashboard.html'; return; }

      const status = getSubStatus(currentSub);
      const days = daysUntil(currentSub.nextBilling || currentSub.trialEnd || currentSub.startDate);

      document.getElementById('d-icon').textContent = getSubIcon(currentSub.name);
      document.getElementById('d-name').textContent = currentSub.name;
      document.getElementById('d-type').textContent = currentSub.type === 'trial' ? 'Free Trial' : 'Langganan Berbayar';
      document.getElementById('d-price').textContent = currentSub.type === 'trial' ? 'Gratis' : `${formatCurrency(currentSub.price)} / ${currentSub.billingCycle === 'monthly' ? 'bulan' : 'tahun'}`;
      document.getElementById('d-status').innerHTML = `<span class="badge ${status.cls}">${status.label}</span>`;
      document.getElementById('d-cycle').textContent = currentSub.billingCycle === 'monthly' ? 'Bulanan' : currentSub.billingCycle === 'yearly' ? 'Tahunan' : 'Mingguan';
      document.getElementById('d-start').textContent = formatDate(currentSub.startDate);

      const nextDate = currentSub.nextBilling || currentSub.trialEnd;
      document.getElementById('d-next-label').textContent = currentSub.type === 'trial' ? 'Berakhir pada' : 'Tagihan berikutnya';
      document.getElementById('d-next').textContent = nextDate ? formatDate(nextDate) : '-';

      document.getElementById('d-notes').textContent = currentSub.notes || '-';

      if (days >= 0 && days <= 3) {
        document.getElementById('warning-msg').textContent = `Langganan ini akan ${currentSub.type === 'trial' ? 'berakhir' : 'jatuh tempo'} dalam ${days} hari lagi!`;
        document.getElementById('expiring-warning').style.display = 'flex';
      }
    }

    function openEditModal() {
      const s = currentSub;
      document.getElementById('e-name').value = s.name;
      document.getElementById('e-type').value = s.type;
      document.getElementById('e-price').value = s.price;
      document.getElementById('e-cycle').value = s.billingCycle;
      document.getElementById('e-start').value = s.startDate;
      document.getElementById('e-next').value = s.nextBilling || '';
      document.getElementById('e-trial-end').value = s.trialEnd || '';
      document.getElementById('e-notes').value = s.notes || '';
      toggleEditTrialFields();
      document.getElementById('edit-modal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('show');
    }

    function toggleEditTrialFields() {
      const type = document.getElementById('e-type').value;
      document.getElementById('e-price-group').style.display = type === 'trial' ? 'none' : '';
      document.getElementById('e-next-group').style.display = type === 'trial' ? 'none' : '';
      document.getElementById('e-trial-group').style.display = type === 'trial' ? '' : 'none';
    }

    function saveEdit() {
      const name = document.getElementById('e-name').value.trim();
      const type = document.getElementById('e-type').value;
      const price = type === 'trial' ? 0 : document.getElementById('e-price').value;
      const billingCycle = document.getElementById('e-cycle').value;
      const startDate = document.getElementById('e-start').value;
      const nextBilling = document.getElementById('e-next').value;
      const trialEnd = document.getElementById('e-trial-end').value;
      const notes = document.getElementById('e-notes').value.trim();

      if (!name) return showAlert('edit-alert', 'Nama wajib diisi.');
      editSub(subId, { name, type, price: Number(price), billingCycle, startDate, nextBilling, trialEnd, notes });
      closeEditModal();
      renderDetail();
    }

    function openDeleteModal() {
      document.getElementById('del-modal').classList.add('show');
    }

    function doDelete() {
      deleteSub(subId);
      window.location.href = 'dashboard.html';
    }

    renderDetail();
  </script>
</body>
</html>

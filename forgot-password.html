<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/substracker/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substracker — Reset Password</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a4db8,#00c8e0);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;font-weight:900;color:white;">S</div>
      <h1>Substracker</h1>
    </div>

    <h2>Reset password</h2>
    <p class="subtitle">Masukkan emailmu, kami kirimkan link reset password</p>

    <div id="fp-alert" class="alert alert-error"></div>
    <div id="fp-success" class="alert alert-success"></div>

    <div class="form-group">
      <label>Email terdaftar</label>
      <input type="email" id="fp-email" placeholder="email@kamu.com">
    </div>

    <button class="btn-primary" id="btn-reset">Kirim link reset</button>

    <div class="auth-footer">
      <a href="index.html">← Kembali ke login</a>
    </div>
  </div>

  <script type="module">
    import { auth, sendPasswordResetEmail, showAlert } from './js/app.js';

    document.getElementById('btn-reset').addEventListener('click', doReset);

    async function doReset() {
      const email = document.getElementById('fp-email').value.trim();
      if (!email) return showAlert('fp-alert', 'Masukkan email kamu.');

      const btn = document.getElementById('btn-reset');
      btn.disabled    = true;
      btn.textContent = 'Mengirim...';

      try {
        await sendPasswordResetEmail(auth, email);
        showAlert('fp-success',
          'Link reset password sudah dikirim! Cek inbox emailmu.', 'success');
      } catch (err) {
        const msg = err.code === 'auth/user-not-found'
          ? 'Email tidak ditemukan.'
          : 'Gagal mengirim email. Coba lagi.';
        showAlert('fp-alert', msg);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Kirim link reset';
      }
    }
  </script>
</body>
</html>

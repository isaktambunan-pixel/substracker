<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/substracker/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substracker — Daftar</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a4db8,#00c8e0);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;font-weight:900;color:white;">S</div>
      <h1>Substracker</h1>
      <p>Kelola semua langganan kamu di satu tempat</p>
    </div>

    <h2>Buat akun</h2>
    <p class="subtitle">Gratis selamanya, tanpa kartu kredit</p>

    <div id="reg-alert" class="alert alert-error"></div>
    <div id="reg-success" class="alert alert-success"></div>

    <div class="form-group">
      <label>Nama lengkap</label>
      <input type="text" id="reg-name" placeholder="Nama kamu">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="email@kamu.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Minimal 6 karakter">
    </div>
    <div class="form-group">
      <label>Konfirmasi password</label>
      <input type="password" id="reg-confirm" placeholder="Ulangi password">
    </div>

    <button class="btn-primary" id="btn-register">Buat akun</button>

    <div class="auth-footer">
      Sudah punya akun? <a href="index.html">Masuk</a>
    </div>
  </div>

  <script type="module">
    import {
      auth, db, redirectIfLoggedIn,
      createUserWithEmailAndPassword,
      saveUserProfile, seedDemoData, showAlert
    } from './js/app.js';

    await redirectIfLoggedIn('dashboard.html');

    document.getElementById('btn-register').addEventListener('click', doRegister);

    async function doRegister() {
      const name    = document.getElementById('reg-name').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!name || !email || !pass || !confirm) return showAlert('reg-alert', 'Isi semua kolom ya.');
      if (pass.length < 6)  return showAlert('reg-alert', 'Password minimal 6 karakter.');
      if (pass !== confirm) return showAlert('reg-alert', 'Password tidak cocok.');

      const btn = document.getElementById('btn-register');
      btn.disabled    = true;
      btn.textContent = 'Membuat akun...';

      try {
        const { user } = await createUserWithEmailAndPassword(auth, email, pass);

        // Simpan nama ke Firestore (Firebase Auth hanya simpan email)
        await saveUserProfile(user.uid, { name, email, createdAt: new Date().toISOString() });

        // Isi data demo supaya langsung ada isinya
        await seedDemoData(user.uid);

        window.location.href = 'dashboard.html';
      } catch (err) {
        const msg = err.code === 'auth/email-already-in-use'
          ? 'Email sudah terdaftar.'
          : err.code === 'auth/invalid-email'
          ? 'Format email tidak valid.'
          : 'Gagal membuat akun. Coba lagi.';
        showAlert('reg-alert', msg);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Buat akun';
      }
    }
  </script>
</body>
</html>

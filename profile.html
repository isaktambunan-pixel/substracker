<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/substracker/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substracker — Profile</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1e90ff,#00c8e0);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;flex-shrink:0;">S</div>
        <span>Substracker</span>
      </div>
      <div class="nav-section">
        <div class="nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">➕</span> Tambah langganan
        </a>
      </div>
      <div class="nav-section" style="margin-top:8px;">
        <div class="nav-label">Akun</div>
        <a href="profile.html" class="nav-item active">
          <span class="nav-icon">👤</span> Profile
        </a>
        <button class="nav-item" id="btn-logout">
          <span class="nav-icon">🚪</span> Logout
        </button>
      </div>
      <div class="sidebar-bottom">
        <a href="profile.html" style="text-decoration:none;">
          <div class="user-card">
            <div class="user-avatar">U</div>
            <div class="user-info">
              <div class="user-name">User</div>
              <div class="user-email">user@email.com</div>
            </div>
          </div>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div class="page-title">
          <h1>Profile</h1>
          <p>Kelola informasi akun kamu</p>
        </div>
      </div>

      <div class="profile-card">
        <div class="profile-avatar-section">
          <div class="profile-avatar-big" id="profile-avatar-big">U</div>
          <div class="profile-avatar-info">
            <h2 id="profile-name-display">User</h2>
            <p id="profile-email-display">user@email.com</p>
          </div>
        </div>

        <div id="profile-alert" class="alert alert-error"></div>
        <div id="profile-success" class="alert alert-success"></div>

        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text-dark);">Edit informasi</h3>

        <div class="form-group">
          <label>Nama lengkap</label>
          <input type="text" id="profile-name" placeholder="Nama kamu">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profile-email" placeholder="email@kamu.com">
        </div>
        <!-- Password saat ini diperlukan untuk verifikasi sebelum update email -->
        <div class="form-group" id="reauth-group" style="display:none;">
          <label>Password saat ini (untuk ganti email)</label>
          <input type="password" id="current-pass-profile" placeholder="Password kamu saat ini">
        </div>

        <button class="btn-primary" id="btn-save-profile">Simpan perubahan</button>

        <hr style="margin:28px 0;border:none;border-top:1px solid var(--gray-mid);">

        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text-dark);">Ganti password</h3>

        <div id="pw-alert" class="alert alert-error"></div>
        <div id="pw-success" class="alert alert-success"></div>

        <div class="form-group">
          <label>Password saat ini</label>
          <input type="password" id="current-password" placeholder="Password lama kamu">
        </div>
        <div class="form-group">
          <label>Password baru</label>
          <input type="password" id="new-password" placeholder="Minimal 6 karakter">
        </div>
        <div class="form-group">
          <label>Konfirmasi password baru</label>
          <input type="password" id="confirm-password" placeholder="Ulangi password baru">
        </div>

        <button class="btn-secondary" id="btn-change-pw">Ganti password</button>
      </div>
    </main>
  </div>

  <script type="module">
    import {
      auth, requireAuth, signOut,
      updatePassword, updateEmail,
      EmailAuthProvider, reauthenticateWithCredential,
      getUserProfile, saveUserProfile,
      initUserUI, showAlert
    } from './js/app.js';

    const user    = await requireAuth();
    if (!user) throw 0;
    const profile = await getUserProfile(user.uid);
    initUserUI(user, profile);

    // Pre-fill form
    document.getElementById('profile-name').value  = profile?.name  || '';
    document.getElementById('profile-email').value = user.email;
    document.getElementById('profile-name-display').textContent  = profile?.name || user.email;
    document.getElementById('profile-email-display').textContent = user.email;
    document.getElementById('profile-avatar-big').textContent    = (profile?.name || user.email).charAt(0).toUpperCase();

    // Tampilkan field password kalau email diubah
    document.getElementById('profile-email').addEventListener('input', () => {
      const showReauth = document.getElementById('profile-email').value !== user.email;
      document.getElementById('reauth-group').style.display = showReauth ? '' : 'none';
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });

    // ── SAVE PROFILE ──────────────────────────────────────────────
    document.getElementById('btn-save-profile').addEventListener('click', async () => {
      const name     = document.getElementById('profile-name').value.trim();
      const newEmail = document.getElementById('profile-email').value.trim();
      if (!name) return showAlert('profile-alert', 'Nama wajib diisi.');

      const btn = document.getElementById('btn-save-profile');
      btn.disabled    = true;
      btn.textContent = 'Menyimpan...';

      try {
        // Update nama di Firestore
        await saveUserProfile(user.uid, { name, email: newEmail });

        // Update email di Firebase Auth (perlu re-autentikasi)
        if (newEmail !== user.email) {
          const curPass = document.getElementById('current-pass-profile').value;
          if (!curPass) {
            btn.disabled    = false;
            btn.textContent = 'Simpan perubahan';
            return showAlert('profile-alert', 'Masukkan password saat ini untuk mengganti email.');
          }
          const cred = EmailAuthProvider.credential(user.email, curPass);
          await reauthenticateWithCredential(user, cred);
          await updateEmail(user, newEmail);
        }

        showAlert('profile-success', 'Profile berhasil diperbarui!', 'success');
        document.getElementById('profile-name-display').textContent = name;
        document.getElementById('profile-email-display').textContent = newEmail;
        document.getElementById('profile-avatar-big').textContent    = name.charAt(0).toUpperCase();
        document.querySelectorAll('.user-name').forEach(el => el.textContent = name);
        document.getElementById('reauth-group').style.display = 'none';
      } catch (err) {
        const msg = err.code === 'auth/wrong-password'
          ? 'Password saat ini salah.'
          : err.code === 'auth/email-already-in-use'
          ? 'Email sudah dipakai akun lain.'
          : 'Gagal memperbarui. Coba lagi.';
        showAlert('profile-alert', msg);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Simpan perubahan';
      }
    });

    // ── CHANGE PASSWORD ───────────────────────────────────────────
    document.getElementById('btn-change-pw').addEventListener('click', async () => {
      const curPass = document.getElementById('current-password').value;
      const newPass = document.getElementById('new-password').value;
      const confPass = document.getElementById('confirm-password').value;

      if (!curPass || !newPass || !confPass) return showAlert('pw-alert', 'Isi semua kolom password.');
      if (newPass.length < 6)   return showAlert('pw-alert', 'Password baru minimal 6 karakter.');
      if (newPass !== confPass) return showAlert('pw-alert', 'Password tidak cocok.');

      const btn = document.getElementById('btn-change-pw');
      btn.disabled    = true;
      btn.textContent = 'Memperbarui...';

      try {
        // Re-autentikasi dulu sebelum ganti password
        const cred = EmailAuthProvider.credential(user.email, curPass);
        await reauthenticateWithCredential(user, cred);
        await updatePassword(user, newPass);

        showAlert('pw-success', 'Password berhasil diubah!', 'success');
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value     = '';
        document.getElementById('confirm-password').value = '';
      } catch (err) {
        const msg = err.code === 'auth/wrong-password'
          ? 'Password saat ini salah.'
          : 'Gagal mengganti password. Coba lagi.';
        showAlert('pw-alert', msg);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Ganti password';
      }
    });
  </script>
</body>
</html>
